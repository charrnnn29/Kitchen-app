<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KITCHEN OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #030a03;
      --bg2: #050f05;
      --green: #00ff41;
      --green-dim: #00c032;
      --green-dark: #004d14;
      --green-glow: rgba(0,255,65,0.15);
      --green-faint: rgba(0,255,65,0.05);
      --amber: #ffb700;
      --red: #ff3131;
      --cyan: #00f5ff;
      --text: #00ff41;
      --text-dim: #007a1f;
      --border: #00ff4133;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
    }

    /* Scanlines overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* CRT vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 998;
    }

    /* HEADER */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--green);
      text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,65,0.3);
      animation: flicker 8s infinite;
    }

    @keyframes flicker {
      0%,95%,97%,100% { opacity: 1; }
      96% { opacity: 0.7; }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .header-right span { color: var(--green); }

    .online-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--green);
    }

    .blink-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink-anim 1s step-end infinite;
    }

    @keyframes blink-anim { 50% { opacity: 0; } }

    /* STATS BAR */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .stat-block {
      padding: 20px 32px;
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .stat-block:last-child { border-right: none; }

    .stat-block::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--green-faint);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .stat-block:hover::before { opacity: 1; }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--green);
      text-shadow: 0 0 15px rgba(0,255,65,0.5);
      line-height: 1;
    }

    .stat-value.amber { color: var(--amber); text-shadow: 0 0 15px rgba(255,183,0,0.5); }
    .stat-value.red   { color: var(--red);   text-shadow: 0 0 15px rgba(255,49,49,0.5); }
    .stat-value.cyan  { color: var(--cyan);  text-shadow: 0 0 15px rgba(0,245,255,0.5); }

    /* MAIN LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: calc(100vh - 120px);
    }

    /* PANEL */
    .panel {
      border-right: 1px solid var(--border);
      padding: 28px;
      background: var(--bg2);
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .terminal-input-wrap {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      background: var(--bg);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .terminal-input-wrap:focus-within {
      border-color: var(--green);
      box-shadow: 0 0 0 2px var(--green-glow), inset 0 0 20px var(--green-faint);
    }

    .prompt-sym {
      color: var(--green);
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      caret-color: var(--green);
    }

    .terminal-input::placeholder { color: var(--text-dim); }

    .chip-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 20px;
    }

    .chip {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chip:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-faint);
      box-shadow: 0 0 8px var(--green-glow);
    }

    .chip.active {
      border-color: var(--green);
      color: var(--bg);
      background: var(--green);
      box-shadow: 0 0 12px rgba(0,255,65,0.4);
    }

    .execute-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--green);
      border-radius: 3px;
      padding: 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--green);
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .execute-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--green);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s;
      z-index: -1;
    }

    .execute-btn:hover {
      color: var(--bg);
      box-shadow: 0 0 20px rgba(0,255,65,0.4);
    }

    .execute-btn:hover::before { transform: scaleX(1); }
    .execute-btn:active { transform: scale(0.98); }

    /* ORDER FEED */
    .feed-area {
      padding: 28px;
      overflow-y: auto;
    }

    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .feed-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .filter-group { display: flex; gap: 4px; }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 5px 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .filter-btn:hover { border-color: var(--green); color: var(--green); }
    .filter-btn.active { border-color: var(--green); color: var(--green); background: var(--green-faint); }

    .order-list { display: flex; flex-direction: column; gap: 8px; }

    .order-row {
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 80px 1fr auto auto;
      align-items: center;
      gap: 16px;
      background: var(--bg2);
      transition: all 0.2s;
      animation: rowIn 0.2s ease forwards;
      opacity: 0;
      position: relative;
      overflow: hidden;
    }

    .order-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }

    .order-row.pending::before   { background: var(--amber); }
    .order-row.preparing::before { background: var(--red); }
    .order-row.ready::before     { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .order-row.delivered::before { background: var(--cyan); }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .order-row:hover {
      border-color: var(--green-dim);
      background: var(--green-faint);
    }

    .order-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .order-dish {
      font-size: 0.88rem;
      color: var(--green);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .order-dish .emoji { font-size: 1rem; }

    .status-pill {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      border: 1px solid;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-pill.pending   { color: var(--amber); border-color: var(--amber); background: rgba(255,183,0,0.08); }
    .status-pill.preparing { color: var(--red);   border-color: var(--red);   background: rgba(255,49,49,0.08); }
    .status-pill.ready     { color: var(--green); border-color: var(--green); background: var(--green-faint); box-shadow: 0 0 8px var(--green-glow); }
    .status-pill.delivered { color: var(--cyan);  border-color: var(--cyan);  background: rgba(0,245,255,0.08); }

    .action-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 5px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .action-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-faint);
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .empty-state .ascii {
      font-size: 0.7rem;
      line-height: 1.4;
      margin-bottom: 20px;
      color: var(--green-dark);
    }

    .empty-state p {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink-anim 1s step-end infinite;
      margin-left: 2px;
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .panel { border-right: none; border-bottom: 1px solid var(--border); }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .stat-block:nth-child(2) { border-right: none; }
      .order-row { grid-template-columns: 60px 1fr; }
      .status-pill, .action-btn { display: none; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">KITCHEN_OS v2.0<span class="cursor"></span></div>
  <div class="header-right">
    <span>SYS: <span>ONLINE</span></span>
    <span>NODE: <span>DOCKER-K8S</span></span>
    <div class="online-indicator">
      <span class="blink-dot"></span>
      LIVE
    </div>
    <span id="clock">00:00:00</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-block">
    <div class="stat-label">// total_orders</div>
    <div class="stat-value" id="stat-total">00</div>
  </div>
  <div class="stat-block">
    <div class="stat-label">// pending</div>
    <div class="stat-value amber" id="stat-pending">00</div>
  </div>
  <div class="stat-block">
    <div class="stat-label">// preparing</div>
    <div class="stat-value red" id="stat-preparing">00</div>
  </div>
  <div class="stat-block">
    <div class="stat-label">// ready</div>
    <div class="stat-value cyan" id="stat-ready">00</div>
  </div>
</div>

<div class="main">

  <div class="panel">
    <div class="panel-title">// new_order</div>
    <div class="terminal-input-wrap">
      <span class="prompt-sym">$&gt;</span>
      <input class="terminal-input" id="dish-input" type="text" placeholder="enter dish name..." autocomplete="off" />
    </div>

    <div class="panel-title">// quick_select</div>
    <div class="chip-grid">
      <button class="chip" onclick="selectChip(this,'Masala Dosai')">🫓 Masala Dosai</button>
      <button class="chip" onclick="selectChip(this,'Idli Sambar')">🍚 Idli Sambar</button>
      <button class="chip" onclick="selectChip(this,'Chicken Biryani')">🍗 Biryani</button>
      <button class="chip" onclick="selectChip(this,'Paneer Tikka')">🧀 Paneer Tikka</button>
      <button class="chip" onclick="selectChip(this,'Pongal')">🥣 Pongal</button>
      <button class="chip" onclick="selectChip(this,'Vada')">🍩 Vada</button>
      <button class="chip" onclick="selectChip(this,'Dal Tadka')">🥘 Dal Tadka</button>
      <button class="chip" onclick="selectChip(this,'Gobi Manchurian')">🥦 Gobi Manchurian</button>
      <button class="chip" onclick="selectChip(this,'Uttapam')">🥞 Uttapam</button>
      <button class="chip" onclick="selectChip(this,'Chicken 65')">🍗 Chicken 65</button>
      <button class="chip" onclick="selectChip(this,'Palak Paneer')">🥬 Palak Paneer</button>
      <button class="chip" onclick="selectChip(this,'Mutton Curry')">🍖 Mutton Curry</button>
    </div>

    <button class="execute-btn" onclick="placeOrder()">
      [ EXECUTE ORDER ]
    </button>
  </div>

  <div class="feed-area">
    <div class="feed-header">
      <div class="feed-title">// order_feed</div>
      <div class="filter-group">
        <button class="filter-btn active" onclick="setFilter('all',this)">ALL</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">PEND</button>
        <button class="filter-btn" onclick="setFilter('preparing',this)">PREP</button>
        <button class="filter-btn" onclick="setFilter('ready',this)">READY</button>
        <button class="filter-btn" onclick="setFilter('delivered',this)">DONE</button>
      </div>
    </div>
    <div class="order-list" id="order-list"></div>
  </div>

</div>

<script>
  const API = 'http://localhost:3000';
  let allOrders = [];
  let currentFilter = 'all';

  const EMOJIS = {
    'Masala Dosai':'🫓','Idli Sambar':'🍚','Pongal':'🥣','Vada':'🍩',
    'Uttapam':'🥞','Paneer Tikka':'🧀','Chicken Biryani':'🍗','Dal Tadka':'🥘',
    'Palak Paneer':'🥬','Mutton Curry':'🍖','Gobi Manchurian':'🥦',
    'Chicken 65':'🍗','Onion Pakoda':'🧅'
  };

  const NEXT = { pending:'preparing', preparing:'ready', ready:'delivered' };
  const NEXT_LABEL = { pending:'▶ COOK', preparing:'✓ READY', ready:'⬆ DELIVER' };

  function pad(n) { return String(n).padStart(2,'0'); }
  function getEmoji(d) { return EMOJIS[d] || '🍽️'; }

  setInterval(() => {
    const n = new Date();
    document.getElementById('clock').textContent =
      `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  }, 1000);

  function selectChip(el, dish) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('dish-input').value = dish;
    document.getElementById('dish-input').focus();
  }

  function updateStats() {
    const fmt = n => String(n).padStart(2,'0');
    document.getElementById('stat-total').textContent     = fmt(allOrders.length);
    document.getElementById('stat-pending').textContent   = fmt(allOrders.filter(o=>o.status==='pending').length);
    document.getElementById('stat-preparing').textContent = fmt(allOrders.filter(o=>o.status==='preparing').length);
    document.getElementById('stat-ready').textContent     = fmt(allOrders.filter(o=>o.status==='ready').length);
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  }

  function renderOrders() {
    const list = document.getElementById('order-list');
    const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o=>o.status===currentFilter);

    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty-state">
          <pre class="ascii">
  ____________________
 |                    |
 |   NO ORDERS FOUND  |
 |   AWAITING INPUT   |
 |____________________|
          </pre>
          <p>// SYSTEM READY. PLACE AN ORDER TO BEGIN.</p>
        </div>`;
      return;
    }

    list.innerHTML = [...filtered].reverse().map((o, i) => {
      const next = NEXT[o.status];
      const time = o.createdAt
        ? new Date(o.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})
        : '--:--:--';
      return `
      <div class="order-row ${o.status}" style="animation-delay:${i*0.03}s">
        <div class="order-num">#${String(o.id).padStart(4,'0')}</div>
        <div class="order-dish">
          <span class="emoji">${getEmoji(o.dish)}</span>
          ${o.dish}
        </div>
        <div class="status-pill ${o.status}">${o.status.toUpperCase()}</div>
        <div>
          ${next
            ? `<button class="action-btn" onclick="advanceStatus(${o.id},'${next}')">${NEXT_LABEL[o.status]}</button>`
            : `<span style="font-size:0.68rem;color:var(--cyan);letter-spacing:0.1em">COMPLETE</span>`}
        </div>
      </div>`;
    }).join('');
  }

  async function loadOrders() {
    try {
      const res = await fetch(`${API}/orders`);
      allOrders = await res.json();
      updateStats();
      renderOrders();
    } catch (e) {
      console.error('API unreachable', e);
    }
  }

  async function placeOrder() {
    const dish = document.getElementById('dish-input').value.trim();
    if (!dish) return;
    try {
      const res = await fetch(`${API}/orders`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ dish })
      });
      const order = await res.json();
      allOrders.push(order);
      updateStats();
      renderOrders();
      document.getElementById('dish-input').value = '';
      document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    } catch (e) {
      console.error('Order failed', e);
    }
  }

  async function advanceStatus(id, newStatus) {
    try {
      const res = await fetch(`${API}/orders/${id}`, {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ status: newStatus })
      });
      if (res.ok) {
        const u = await res.json();
        allOrders = allOrders.map(o => o.id===id ? u : o);
      } else {
        allOrders = allOrders.map(o => o.id===id ? {...o, status:newStatus} : o);
      }
    } catch {
      allOrders = allOrders.map(o => o.id===id ? {...o, status:newStatus} : o);
    }
    updateStats();
    renderOrders();
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('dish-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') placeOrder();
    });
  });

  loadOrders();
  setInterval(loadOrders, 15000);
</script>
</body>
</html>
